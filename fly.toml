app = "hybrid-baseball"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  O27V2_DB_PATH = "/data/o27v2.db"

[[mounts]]
  source = "o27v2_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  # Single-machine setup: keep the one machine running instead of cycling it on idle.
  # auto_stop with min=0 was causing fly to stop+start the machine on every idle
  # window, which shows up in the dashboard as "restarting too much".
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  # 256mb was tight — o27 keeps recent games + rosters in memory and OOMs trigger restarts.
  memory = "512mb"
