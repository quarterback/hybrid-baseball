app = "hybrid-baseball"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  # Each saved league is its own SQLite file under this directory on the
  # persistent volume, tracked by saves/registry.json. Do NOT set
  # O27V2_DB_PATH here — that pins a single fixed DB and bypasses the saves
  # registry. The startup migration adopts any legacy /data/o27v2.db as "Save 1".
  O27V2_SAVES_DIR = "/data/saves"

[[mounts]]
  source = "o27v2_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  # Single-machine setup: keep the one machine running instead of cycling it on idle.
  # auto_stop with min=0 was causing fly to stop+start the machine on every idle
  # window, which shows up in the dashboard as "restarting too much".
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  # Bumped from shared-cpu-1x/512mb to chase UI lag: shared-cpu-1x is a single
  # burstable vCPU that gets throttled under sustained work, and 512mb was tight
  # (o27 keeps recent games + rosters in memory; 256mb previously OOM'd). 2 vCPUs
  # + 1gb gives CPU headroom and room for the in-memory caches. Reversible — drop
  # back down or try performance-1x (dedicated CPU) if this isn't enough.
  size = "shared-cpu-2x"
  memory = "1024mb"
