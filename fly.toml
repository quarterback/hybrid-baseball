app = "hybrid-baseball"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  # Each saved league is its own SQLite file under this directory on the
  # persistent volume, tracked by saves/registry.json. Do NOT set
  # O27V2_DB_PATH here — that pins a single fixed DB and bypasses the saves
  # registry. The startup migration adopts any legacy /data/o27v2.db as "Save 1".
  O27V2_SAVES_DIR = "/data/saves"

[[mounts]]
  source = "o27v2_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  # Single-machine setup: keep the one machine running instead of cycling it on idle.
  # auto_stop with min=0 was causing fly to stop+start the machine on every idle
  # window, which shows up in the dashboard as "restarting too much".
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  # performance-1x is a DEDICATED vCPU (no burst throttling). The Leaders/Scores
  # pages do ~2.4s of CPU-bound aggregation per render; on the shared/burstable
  # tiers that throttled out to 30-50s under any concurrency. Dedicated CPU keeps
  # the base compute honest; the in-memory result cache (app.py) removes the
  # recompute entirely on cache hits. Reversible — drop back to shared-cpu-2x if
  # the cache alone proves enough.
  size = "performance-1x"
  memory = "2048mb"
