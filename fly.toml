app = "hybrid-baseball"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  # Each saved league is its own SQLite file under this directory on the
  # persistent volume, tracked by saves/registry.json. Do NOT set
  # O27V2_DB_PATH here — that pins a single fixed DB and bypasses the saves
  # registry. The startup migration adopts any legacy /data/o27v2.db as "Save 1".
  O27V2_SAVES_DIR = "/data/saves"
  # Number of gunicorn workers per machine. performance-2x has 2 dedicated
  # vCPUs; 2 workers keeps CPU-bound sim requests from starving page loads.
  GUNICORN_WORKERS = "2"

[[mounts]]
  source = "o27v2_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  # Off until manually booted: Fly stops idle machines and does NOT auto-start
  # them on incoming requests, so they stay off (no charges) until you
  # explicitly start one with `fly machine start --app hybrid-baseball` (or
  # `fly scale count 1`). While stopped, visiting the URL will NOT wake a
  # machine — the request fails until you boot it. This trades convenience
  # for full control over when the VMs (and their cost) are running.
  auto_stop_machines = 'stop'
  auto_start_machines = false
  # Two machines exist for load distribution. IMPORTANT: each machine mounts
  # its own Fly volume — SQLite state is NOT shared between machines. Use
  # sticky_sessions so every browser client is pinned to one machine for
  # the duration of their session; this prevents a user from seeing
  # inconsistent data across machines. If you need true shared state across
  # machines, migrate to LiteFS (fly.io/docs/litefs) or PostgreSQL.
  # min_machines_running = 0 lets BOTH machines stop when idle; Fly starts
  # one (or more, under concurrency pressure) on demand.
  min_machines_running = 0
  [http_service.concurrency]
    type = "requests"
    # soft_limit triggers back-pressure (Fly routes new connections elsewhere);
    # hard_limit starts rejecting. Sized for 2 gunicorn workers × some queuing.
    soft_limit = 20
    hard_limit = 30

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  # performance-2x: 2 dedicated vCPUs + 4 GB RAM. Two CPUs let gunicorn run
  # 2 workers truly in parallel — one can serve page loads while the other
  # runs a CPU-bound sim batch without stalling the site. The extra RAM
  # keeps the in-memory result cache (app.py) from getting evicted under load.
  size = "performance-2x"
  memory = "4096mb"
