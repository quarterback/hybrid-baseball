<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>CapSpace — O27 Fantasy</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('capspace.static', filename='favicon.svg') }}" />
  <link rel="icon" type="image/x-icon" href="{{ url_for('capspace.static', filename='favicon.ico') }}" />
  <link rel="apple-touch-icon" href="{{ url_for('capspace.static', filename='apple-touch-icon.png') }}" />
  <meta name="theme-color" content="#ff6a2b" />
  <link rel="stylesheet" href="{{ url_for('capspace.static', filename='vendor/fonts.css') }}" />
  <link rel="stylesheet" href="{{ url_for('capspace.static', filename='capspace.css') }}" />
</head>
<body>
  <div id="root"></div>

  <!-- Real save data injected by the blueprint. The currency snapshot mirrors
       the main app (base.html) so the toggle stays authoritative; the slate
       blob is tonight's real games + pool (null ⇒ JS uses its bundled mock). -->
  <script>
    window.O27_RATES = {{ currency_rates | tojson }};
    window.__CAPSPACE_DATA__ = {{ capspace_data | tojson }};
  </script>

  <!-- Self-hosted production React (UMD). The app JS below is pre-compiled
       from the .jsx sources by tools/build_capspace.sh — no Babel compiler
       download (~3 MB) and no in-browser JSX transpile on every load, which
       is what made this page lag. Re-run that script after editing any
       capspace-*.jsx so the served .js stays in sync. -->
  <script src="{{ url_for('capspace.static', filename='vendor/react.production.min.js') }}"></script>
  <script src="{{ url_for('capspace.static', filename='vendor/react-dom.production.min.js') }}"></script>

  <script src="{{ url_for('capspace.static', filename='capspace-data.js') }}"></script>
  <script src="{{ url_for('capspace.static', filename='capspace-ui.js') }}"></script>
  <script src="{{ url_for('capspace.static', filename='capspace-screens.js') }}"></script>
  <script src="{{ url_for('capspace.static', filename='capspace-builder.js') }}"></script>
  <script src="{{ url_for('capspace.static', filename='capspace-app.js') }}"></script>
</body>
</html>
