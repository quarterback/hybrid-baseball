<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>CapSpace — O27 Fantasy</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('capspace.static', filename='favicon.svg') }}" />
  <link rel="icon" type="image/x-icon" href="{{ url_for('capspace.static', filename='favicon.ico') }}" />
  <link rel="apple-touch-icon" href="{{ url_for('capspace.static', filename='apple-touch-icon.png') }}" />
  <meta name="theme-color" content="#ff6a2b" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800;900&family=Hanken+Grotesk:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="{{ url_for('capspace.static', filename='capspace.css') }}" />
</head>
<body>
  <div id="root"></div>

  <!-- Real save data injected by the blueprint. The currency snapshot mirrors
       the main app (base.html) so the toggle stays authoritative; the slate
       blob is tonight's real games + pool (null ⇒ JS uses its bundled mock). -->
  <script>
    window.O27_RATES = {{ currency_rates | tojson }};
    window.__CAPSPACE_DATA__ = {{ capspace_data | tojson }};
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="{{ url_for('capspace.static', filename='capspace-data.jsx') }}"></script>
  <script type="text/babel" src="{{ url_for('capspace.static', filename='capspace-ui.jsx') }}"></script>
  <script type="text/babel" src="{{ url_for('capspace.static', filename='capspace-screens.jsx') }}"></script>
  <script type="text/babel" src="{{ url_for('capspace.static', filename='capspace-builder.jsx') }}"></script>
  <script type="text/babel" src="{{ url_for('capspace.static', filename='capspace-app.jsx') }}"></script>
</body>
</html>
