<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}O27 League{% endblock %} — O27 Baseball</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background: #0d1117; color: #e6edf3; }
    .navbar { background: #161b22 !important; border-bottom: 1px solid #30363d; }
    .navbar-brand { font-weight: 800; color: #58a6ff !important; letter-spacing: .05em; }
    .nav-link { color: #8b949e !important; }
    .nav-link:hover, .nav-link.active { color: #58a6ff !important; }
    .card { background: #161b22; border: 1px solid #30363d; }
    .card-header { background: #1f2937; border-bottom: 1px solid #30363d; }
    .table { color: #e6edf3; }
    .table thead th { background: #1f2937; color: #8b949e; border-color: #30363d; font-size: .78rem; text-transform: uppercase; letter-spacing: .04em; }
    .table tbody td { border-color: #30363d; font-size: .88rem; }
    .table tbody tr:hover { background: #1f2937; }
    .badge-division { font-size: .7rem; padding: .25rem .5rem; }
    .score-big { font-size: 2.2rem; font-weight: 800; }
    .score-label { font-size: .75rem; color: #8b949e; text-transform: uppercase; }
    .stat-pill { display: inline-block; background: #21262d; border-radius: 4px; padding: 2px 8px; font-size: .78rem; margin: 2px; }
    .team-abbrev { font-weight: 700; color: #58a6ff; }
    .winner-badge { background: #238636; color: #fff; border-radius: 3px; padding: 1px 6px; font-size: .72rem; }
    footer { background: #161b22; border-top: 1px solid #30363d; color: #8b949e; font-size: .8rem; }
    a { color: #58a6ff; }
    a:hover { color: #79c0ff; }
    .btn-primary { background: #238636; border-color: #238636; }
    .btn-primary:hover { background: #2ea043; border-color: #2ea043; }
    .btn-secondary { background: #21262d; border-color: #30363d; color: #e6edf3; }
    .btn-secondary:hover { background: #30363d; }
    .progress-bar-skill { height: 6px; border-radius: 3px; background: #58a6ff; }
    .division-header { color: #f0883e; font-weight: 700; font-size: .85rem; text-transform: uppercase; letter-spacing: .06em; }
    .si-badge { background: #6f42c1; color: #fff; border-radius: 3px; padding: 1px 5px; font-size: .7rem; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="{{ url_for('index') }}">⚾ O27 League</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}"
            href="{{ url_for('index') }}">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link {% if request.endpoint == 'standings' %}active{% endif %}"
            href="{{ url_for('standings') }}">Standings</a></li>
        <li class="nav-item"><a class="nav-link {% if request.endpoint == 'schedule' %}active{% endif %}"
            href="{{ url_for('schedule') }}">Schedule</a></li>
        <li class="nav-item"><a class="nav-link {% if request.endpoint in ('stats','player_detail') %}active{% endif %}"
            href="{{ url_for('stats') }}">Stats</a></li>
        <li class="nav-item"><a class="nav-link {% if request.endpoint == 'teams' %}active{% endif %}"
            href="{{ url_for('teams') }}">Teams</a></li>
        <li class="nav-item"><a class="nav-link {% if request.endpoint == 'transactions' %}active{% endif %}"
            href="{{ url_for('transactions') }}">Transactions</a></li>
        <li class="nav-item"><a class="nav-link {% if request.endpoint in ('new_league_get','new_league_post') %}active{% endif %}"
            href="{{ url_for('new_league_get') }}" style="color:#f0883e !important">New League</a></li>
      </ul>
      <form class="d-flex gap-2" id="sim-form">
        <input type="number" class="form-control form-control-sm" id="sim-n" value="5" min="1" max="50"
               style="width:70px; background:#21262d; border-color:#30363d; color:#e6edf3">
        <button type="submit" class="btn btn-primary btn-sm">Sim Games</button>
      </form>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 py-3">
  {% block content %}{% endblock %}
</div>

<footer class="text-center py-3 mt-4">
  O27 League Simulator — powered by the O27 rules engine (1-inning / 27-out structure)
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('sim-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const n = document.getElementById('sim-n').value;
  const btn = e.target.querySelector('button');
  btn.disabled = true;
  btn.textContent = 'Simulating…';
  try {
    const r = await fetch('/api/sim', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({n: parseInt(n)})
    });
    const data = await r.json();
    if (data.simulated > 0) {
      window.location.reload();
    } else {
      btn.disabled = false;
      btn.textContent = 'No games left';
    }
  } catch(err) {
    btn.disabled = false;
    btn.textContent = 'Sim Games';
  }
});
</script>
{% block scripts %}{% endblock %}
</body>
</html>
